name: lifeos
description: Anish's Sovereign Local-First Personal Productivity OS
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Database
  drift: ^2.28.2
  sqlite3_flutter_libs: ^0.5.41
  path_provider: ^2.1.5
  path: ^1.9.1

  # Navigation
  go_router: ^15.1.3

  # Local Notifications
  flutter_local_notifications: ^18.0.1

  # File System
  file_picker: ^10.3.10
  url_launcher: ^6.3.2

  # Audio
  just_audio: ^0.10.5
  audio_service: ^0.18.18

  # Secure Storage
  flutter_secure_storage: ^9.2.4

  # Utilities
  uuid: ^4.5.3
  intl: ^0.20.2
  equatable: ^2.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.28.0
  build_runner: ^2.5.4
  riverpod_generator: ^2.6.5
  custom_lint: ^0.7.6
  riverpod_lint: ^2.6.5
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true