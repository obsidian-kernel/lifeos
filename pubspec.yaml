name: lifeos
description: Anish's Sovereign Local-First Personal Productivity OS
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  drift: ^2.28.2
  sqlite3_flutter_libs: ^0.5.41
  path_provider: ^2.1.5
